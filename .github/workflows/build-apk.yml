name: Build CURAM Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Java 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - name: Force Java 21
        run: |
          echo "JAVA_HOME=$JAVA_HOME_21_X64" >> $GITHUB_ENV
          echo "$JAVA_HOME_21_X64/bin" >> $GITHUB_PATH
          java -version

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Unzip CURAM source
        run: |
          rm -rf curam_app
          unzip -o curam_apk_source.zip -d curam_app
          ls -la curam_app

      - name: Install dependencies
        working-directory: curam_app
        run: npm install

      - name: Add Android platform
        working-directory: curam_app
        run: npx cap add android

      - name: Sync Capacitor
        working-directory: curam_app
        run: npx cap sync android

      - name: Apply CURAM CE Android icon
        working-directory: curam_app
        run: |
          python -m pip install pillow
          python - <<'PY'
          from PIL import Image
          from pathlib import Path

          src = Image.open("../ce_icon_1024.png").convert("RGBA")
          res = Path("android/app/src/main/res")

          sizes = {
              "mipmap-mdpi": 48,
              "mipmap-hdpi": 72,
              "mipmap-xhdpi": 96,
              "mipmap-xxhdpi": 144,
              "mipmap-xxxhdpi": 192
          }

          for folder, size in sizes.items():
              out = res / folder
              out.mkdir(parents=True, exist_ok=True)
              icon = src.resize((size, size))
              icon.save(out / "ic_launcher.png")
              icon.save(out / "ic_launcher_round.png")

          adaptive = res / "mipmap-anydpi-v26"
          if adaptive.exists():
              for file in adaptive.glob("ic_launcher*.xml"):
                  file.unlink()

          print("CURAM CE Android icon applied.")
          PY

      - name: Force Gradle to use Java 21
        working-directory: curam_app/android
        run: |
          echo "org.gradle.java.home=$JAVA_HOME_21_X64" >> gradle.properties
          chmod +x ./gradlew
          java -version
          ./gradlew --version

      - name: Build debug APK
        working-directory: curam_app/android
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CURAM-GUTALAC-debug-apk
          path: curam_app/android/app/build/outputs/apk/debug/app-debug.apk
