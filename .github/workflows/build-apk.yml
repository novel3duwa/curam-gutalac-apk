name: Build CURAM Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

jobs:
  build-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Unzip CURAM source
        run: |
          rm -rf curam_app
          unzip -o curam_apk_source.zip -d curam_app
          ls -la curam_app

      - name: Install dependencies
        working-directory: curam_app
        run: npm install

      - name: Add Android platform
        working-directory: curam_app
        run: npx cap add android

      - name: Sync Capacitor
        working-directory: curam_app
        run: npx cap sync android

      - name: Build debug APK
        working-directory: curam_app/android
        run: chmod +x ./gradlew && ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CURAM-GUTALAC-debug-apk
          path: curam_app/android/app/build/outputs/apk/debug/app-debug.apk
